services:
  frontend:
    build:
      context: ./medcity-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped

  api:
    build:
      context: ./backend_template
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_TYPE: ${DATABASE_TYPE:-postgres}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-medcity}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-medcity}
      DATABASE_NAME: ${DATABASE_NAME:-medcity_connect}
      DATABASE_SYNC: ${DATABASE_SYNC:-true}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      JWT_REFRESH_EXPIRES_IN: 7d
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: "${RESEND_FROM:-MedCity Connect <onboarding@resend.dev>}"
      RESEND_TIMEOUT_MS: ${RESEND_TIMEOUT_MS:-10000}
      CONTACT_NOTIFICATION_TO: ${CONTACT_NOTIFICATION_TO:-contact@medcity.tn}
      NEWSLETTER_NOTIFICATION_TO: ${NEWSLETTER_NOTIFICATION_TO:-contact@medcity.tn}
      NEWSLETTER_CONFIRMATION_ENABLED: ${NEWSLETTER_CONFIRMATION_ENABLED:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@medcity.tn}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123}
      SEED_DOCTOR_AHMED_PASSWORD: ${SEED_DOCTOR_AHMED_PASSWORD:-Medcity123}
      SEED_DOCTOR_RANIA_PASSWORD: ${SEED_DOCTOR_RANIA_PASSWORD:-Medcity123}
      SEED_DOCTOR_DEFAULT_PASSWORD: ${SEED_DOCTOR_DEFAULT_PASSWORD:-Medcity123}
      CDSS_API_BASE_URL: http://cdss:8000/v1
      CDSS_API_TIMEOUT_MS: 60000
      LIBRETRANSLATE_URL: http://libretranslate:5000
      TRANSLATION_SOURCE_LANG: fr
      TRANSLATION_TARGET_LANGS: en,ar
      TRANSLATION_TIMEOUT_MS: 15000
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-temp-consultation-audio}
      SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT:-}
      SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-us-east-1}
      SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID:-}
      SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY:-}
      AUDIO_UPLOAD_LIMIT: ${AUDIO_UPLOAD_LIMIT:-100mb}
      TN_MED_SQLITE_PATH: ${TN_MED_SQLITE_PATH:-/app/data/tn-med-db-v1/database/TN_Med.db}
      TN_MED_IMPORT_LIMIT: ${TN_MED_IMPORT_LIMIT:-}
      DELETE_SUPABASE_AFTER_KAGGLE: ${DELETE_SUPABASE_AFTER_KAGGLE:-false}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      KAGGLE_DATASET_SLUG: ${KAGGLE_DATASET_SLUG:-cdss-temp-consultation-audio}
      KAGGLE_DATASET_REF: ${KAGGLE_DATASET_REF:-}
      KAGGLE_DATASET_TITLE: ${KAGGLE_DATASET_TITLE:-CDSS Temp Consultation Audio}
      KAGGLE_DATASET_LICENSE: ${KAGGLE_DATASET_LICENSE:-CC0-1.0}
      KAGGLE_DATASET_DESCRIPTION: ${KAGGLE_DATASET_DESCRIPTION:-Temporary consultation audio dataset for CDSS development.}
      KAGGLE_SKIP_EXISTING_DATASETS: ${KAGGLE_SKIP_EXISTING_DATASETS:-false}
      KAGGLE_DELETE_OLD_VERSIONS: ${KAGGLE_DELETE_OLD_VERSIONS:-false}
      KAGGLE_KERNEL_REF: ${KAGGLE_KERNEL_REF:-}
      KAGGLE_KERNEL_TITLE: ${KAGGLE_KERNEL_TITLE:-cdss-audio-processor}
      KAGGLE_KERNEL_TYPE: ${KAGGLE_KERNEL_TYPE:-notebook}
      KAGGLE_KERNEL_CODE_FILE: ${KAGGLE_KERNEL_CODE_FILE:-cdss-audio-processor.ipynb}
      KAGGLE_ACCELERATOR: ${KAGGLE_ACCELERATOR:-}
      KAGGLE_EXTRA_DATASET_SOURCES: ${KAGGLE_EXTRA_DATASET_SOURCES:-}
      KAGGLE_MODEL_SOURCES: ${KAGGLE_MODEL_SOURCES:-}
      KAGGLE_ENABLE_INTERNET: ${KAGGLE_ENABLE_INTERNET:-true}
      KAGGLE_ENABLE_GPU: ${KAGGLE_ENABLE_GPU:-false}
      KAGGLE_PERSIST_OUTPUTS_TO_DATASET: ${KAGGLE_PERSIST_OUTPUTS_TO_DATASET:-true}
      KAGGLE_DATASET_READY_TIMEOUT_MS: ${KAGGLE_DATASET_READY_TIMEOUT_MS:-180000}
      KAGGLE_DATASET_READY_INTERVAL_MS: ${KAGGLE_DATASET_READY_INTERVAL_MS:-10000}
    depends_on:
      postgres:
        condition: service_healthy
      cdss:
        condition: service_healthy
      libretranslate:
        condition: service_started
    volumes:
      - ./data:/app/data:ro
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cdss:
    build:
      context: ./cdss_professional/cdss_professional_v4181_patch22_multikg_evidence_validation_exact_fix
      dockerfile: Dockerfile
    environment:
      APP_ENV: docker
      API_PREFIX: /v1
      GENERATION_BACKEND: stub
      LLM_BACKEND: stub
      VECTOR_BACKEND: stub
      KG_BACKEND: stub
      LOCAL_FORMULARY_BACKEND: stub
      ALLOW_STUB_FALLBACKS: "true"
      AUDIT_DIR: /app/data/audit
      FEEDBACK_DIR: /app/data/feedback
    volumes:
      - cdss-audit:/app/data/audit
      - cdss-feedback:/app/data/feedback
    ports:
      - "127.0.0.1:${CDSS_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medcity
      POSTGRES_PASSWORD: medcity
      POSTGRES_DB: medcity_connect
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcity -d medcity_connect"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    environment:
      LT_LOAD_ONLY: fr,en,ar
    ports:
      - "127.0.0.1:${LIBRETRANSLATE_PORT:-5000}:5000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      cdss:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    profiles:
      - host-monitoring
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    profiles:
      - host-monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    restart: unless-stopped

volumes:
  postgres-data:
  cdss-audit:
  cdss-feedback:
  prometheus-data:
  grafana-data:
