name: Deploy Template

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment name
        required: true
        default: staging

jobs:
  deploy:
    name: Deployment handoff
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Show deployment inputs
        run: |
          echo "Images are published by .github/workflows/docker.yml"
          echo "Use these image families for deployment:"
          echo "- ghcr.io/${{ github.repository }}-frontend"
          echo "- ghcr.io/${{ github.repository }}-api"
          echo "- ghcr.io/${{ github.repository }}-cdss"
          echo "Required runtime secrets:"
          echo "- JWT_SECRET"
          echo "- JWT_REFRESH_SECRET"
          echo "- DATABASE_PASSWORD"
          echo "Required runtime database variables:"
          echo "- DATABASE_TYPE=postgres"
          echo "- DATABASE_HOST"
          echo "- DATABASE_PORT=5432"
          echo "- DATABASE_USER"
          echo "- DATABASE_NAME"
          echo "- DATABASE_SSL=true for Supabase"
          echo "- CDSS model/data volume configuration if not using stub mode"

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config
