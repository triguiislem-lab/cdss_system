name: Deploy EC2

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER || 'ubuntu' }}
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/cdss_system' }}
      DEPLOY_REF: ${{ inputs.ref }}

    steps:
      - name: Validate deployment configuration
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_SSH_KEY"

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "set -e
            cd '$EC2_APP_DIR'
            git fetch origin main --tags
            git checkout main
            if [ '$DEPLOY_REF' = 'main' ]; then
              git reset --hard origin/main
            else
              git reset --hard '$DEPLOY_REF'
            fi
            docker compose up -d --build
            docker compose ps
            curl -fsS http://127.0.0.1:3000/api/health
            curl -fsS http://127.0.0.1:8000/health
            curl -fsS -I http://127.0.0.1
          "
