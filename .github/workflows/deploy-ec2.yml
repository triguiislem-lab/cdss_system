name: Deploy EC2

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      EC2_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER || 'ubuntu' }}
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/cdss_system' }}
      DEPLOY_REF: ${{ inputs.ref || github.event.workflow_run.head_sha || 'main' }}

    steps:
      - name: Validate deployment configuration
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$EC2_HOST" ]; then
            echo "::error title=Missing EC2_HOST::Set EC2_HOST as a repository secret or repository variable to the EC2 public DNS or IP."
            missing=1
          fi
          if [ -z "$EC2_SSH_KEY" ]; then
            echo "::error title=Missing EC2_SSH_KEY::Set the repository secret EC2_SSH_KEY to the private PEM key content."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "::notice title=EC2 deploy setup::GitHub repository settings required: Secrets EC2_SSH_KEY, and Secret or Variable EC2_HOST. Variables EC2_USER and EC2_APP_DIR are optional."
            exit 1
          fi

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "DEPLOY_REF='$DEPLOY_REF' EC2_APP_DIR='$EC2_APP_DIR' bash -se" <<'REMOTE'
            cd "$EC2_APP_DIR"

            git fetch --prune origin main --tags
            if [ "$DEPLOY_REF" = "main" ]; then
              git checkout main
              git reset --hard origin/main
            else
              git fetch --depth=1 origin "$DEPLOY_REF"
              git checkout --detach FETCH_HEAD
            fi

            docker compose up -d --build --remove-orphans
            docker compose ps

            endpoint_port() {
              docker compose port "$1" "$2" 2>/dev/null | awk -F: 'END { print $NF }'
            }

            api_port="$(endpoint_port api 3000)"
            cdss_port="$(endpoint_port cdss 8000)"
            frontend_port="$(endpoint_port frontend 80)"
            grafana_port="$(endpoint_port grafana 3000)"

            curl -fsS "http://127.0.0.1:${api_port:-3000}/api/health"
            curl -fsS "http://127.0.0.1:${cdss_port:-8000}/health"
            curl -fsS -I "http://127.0.0.1:${frontend_port:-5173}"

            if [ -n "$grafana_port" ]; then
              curl -fsS "http://127.0.0.1:$grafana_port/api/health"
            fi
          REMOTE
