name: Docker

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Build and publish images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: frontend
            context: medcity-app
            file: medcity-app/Dockerfile
            image_suffix: frontend
          - name: api
            context: backend_template
            file: backend_template/Dockerfile
            image_suffix: api
          - name: cdss
            context: cdss_professional/cdss_professional_v4181_patch22_multikg_evidence_validation_exact_fix
            file: cdss_professional/cdss_professional_v4181_patch22_multikg_evidence_validation_exact_fix/Dockerfile
            image_suffix: cdss

    steps:
      - name: Checkout
        env:
          CHECKOUT_REF: ${{ github.sha }}
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "$CHECKOUT_REF"
          git checkout --force FETCH_HEAD

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image_suffix }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'workflow_run' }}
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
